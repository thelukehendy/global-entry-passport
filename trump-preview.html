<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trump Head Preview</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1a2438; color: #eee; font-family: system-ui, sans-serif; }
    #c { width: 100%; height: 100%; display: block; }
    #hud {
      position: fixed; left: 12px; top: 12px; z-index: 2;
      background: rgba(0,0,0,.55); padding: 10px 12px; border-radius: 8px;
      font-size: 13px; line-height: 1.4; max-width: 360px;
    }
    button { margin: 4px 4px 0 0; cursor: pointer; }
    pre { font-size: 11px; white-space: pre-wrap; max-height: 45vh; overflow: auto; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="status">Loading…</div>
    <div>
      <button type="button" id="btn-meshy">Meshy Trump GLB</button>
      <button type="button" id="btn-denys">Denys Trump FBX</button>
      <button type="button" id="btn-bigt">Big T GLB</button>
    </div>
    <div>Drag orbit · scroll zoom</div>
    <pre id="log"></pre>
  </div>
  <canvas id="c"></canvas>
  <script type="module" src="/src/trump-preview-main.js"></script>
</body>
</html>
